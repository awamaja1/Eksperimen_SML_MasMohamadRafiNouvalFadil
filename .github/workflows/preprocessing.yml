name: Automate Data Preprocessing

on:
  push:
    branches:
      - main
    paths:
      - 'credit_scoring_raw/**'
      - 'preprocessing/automate_MasMohamadRafiNouvalFadil.py'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn

    - name: Run preprocessing
      run: |
        python preprocessing/automate_MasMohamadRafiNouvalFadil.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add preprocessing/credit_scoring_preprocessing/
        git commit -m "Automated data preprocessing update" || echo "No changes to commit"
        git push
